<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- ============================================================
       ЭМБЛЕМА СРОСС®  —  Круглый медальон
       Компиляция мотивов: ООН-Хабитат (синий круг, международный
       статус) + сейсмограмма (волны от эпицентра) + название
       СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ / СРОСС®
       Стиль: строгий, официально-научный
       ============================================================ -->

  <defs>
    <!-- Цветовая палитра (UN-aligned, строгая) -->
    <!-- UN Blue   #00549F  основной -->
    <!-- Deep Navy #003366  акцентный -->
    <!-- Steel     #4A6378  вспомогательный -->
    <!-- Cream     #FAF7F2  нейтральный фон -->
    <!-- Alert     #C8102E  точка-эпицентр (минимум) -->

    <!-- Тонкая дуга для текста (верхняя, надпись "СРОСС") -->
    <path id="topArc"
          d="M 130,300 A 170,170 0 0 1 470,300"
          fill="none"/>
    <!-- Тонкая дуга для текста (нижняя, надпись "СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ") -->
    <path id="bottomArc"
          d="M 140,335 A 160,160 0 0 0 460,335"
          fill="none"/>

    <!-- Линейный градиент для синего кольца -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#00549F"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>

    <!-- Радиальный градиент для центрального поля -->
    <radialGradient id="centerGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F4F7"/>
    </radialGradient>
  </defs>

  <!-- 1. Внешний синий круг (медальон) -->
  <circle cx="300" cy="300" r="290" fill="url(#ringGrad)"/>

  <!-- 2. Внутреннее поле (рабочая зона) -->
  <circle cx="300" cy="300" r="220" fill="url(#centerGrad)"/>

  <!-- 3. Тонкая разделительная обводка -->
  <circle cx="300" cy="300" r="220" fill="none" stroke="#003366" stroke-width="1.2"/>
  <circle cx="300" cy="300" r="225" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- ============================================================
       4. ЦЕНТРАЛЬНЫЙ СЕЙСМИЧЕСКИЙ МОТИФ
       Концепция: эпицентр (точка) в центре, от него расходятся
       концентрические волны разной амплитуды. Геометрия строгая.
       ============================================================ -->

  <!-- Концентрические окружности (распространение волны) -->
  <g fill="none" stroke="#00549F" stroke-linecap="round">
    <circle cx="300" cy="300" r="22"  stroke-width="2.2"/>
    <circle cx="300" cy="300" r="42"  stroke-width="1.6" opacity="0.85"/>
    <circle cx="300" cy="300" r="64"  stroke-width="1.3" opacity="0.7"/>
    <circle cx="300" cy="300" r="88"  stroke-width="1.1" opacity="0.55"/>
    <circle cx="300" cy="300" r="114" stroke-width="0.9" opacity="0.4"/>
  </g>

  <!-- Сейсмические волны — 4 горизонтальные синусоиды разной амплитуды,
       наложенные на концентрические окружности (как на настоящей
       сейсмограмме: волны затухают с расстоянием от эпицентра) -->
  <g fill="none" stroke="#003366" stroke-linecap="round">
    <!-- Верхняя волна (макс амплитуда) -->
    <path d="M 175,215
             Q 200,180 225,215 T 275,215 T 325,215 T 375,215 T 425,215"
          stroke-width="2.2" opacity="0.95"/>
    <!-- Средне-верхняя -->
    <path d="M 165,260
             Q 200,228 235,260 T 305,260 T 375,260 T 435,260"
          stroke-width="1.8" opacity="0.75"/>
    <!-- Средне-нижняя (симметрия) -->
    <path d="M 165,340
             Q 200,372 235,340 T 305,340 T 375,340 T 435,340"
          stroke-width="1.8" opacity="0.75"/>
    <!-- Нижняя волна (симметричная верхней) -->
    <path d="M 175,385
             Q 200,420 225,385 T 275,385 T 325,385 T 375,385 T 425,385"
          stroke-width="2.2" opacity="0.95"/>
  </g>

  <!-- 5. Эпицентр — небольшая точка красного цвета (строгий акцент,
       как на картах сейсмической опасности) -->
  <circle cx="300" cy="300" r="6" fill="#C8102E"/>
  <circle cx="300" cy="300" r="3" fill="#FFFFFF"/>

  <!-- ============================================================
       6. ТЕКСТ ПО ОКРУЖНОСТИ
       Верхняя дуга: СРОСС®
       Нижняя дуга: СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ
       ============================================================ -->
  <text font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" letter-spacing="6"
        fill="#FFFFFF" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">СРОСС®</textPath>
  </text>

  <text font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="600" letter-spacing="3"
        fill="#FFFFFF" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ</textPath>
  </text>

  <!-- 7. Декоративные точки-разделители (4 шт. по сторонам света) -->
  <g fill="#FFFFFF">
    <circle cx="300" cy="80"  r="3.5"/>
    <circle cx="300" cy="520" r="3.5"/>
    <circle cx="80"  cy="300" r="3.5"/>
    <circle cx="520" cy="300" r="3.5"/>
  </g>

  <!-- 8. Тонкая внешняя кайма -->
  <circle cx="300" cy="300" r="288" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="300" r="293" fill="none" stroke="#003366" stroke-width="0.8"/>

</svg>
