<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <!-- ============================================================
       ВЕРТИКАЛЬНАЯ КОМПОНОВКА СРОСС® (v.2.0)
       Эмблема сверху (без волн, с пульсирующими кольцами)
       + название снизу
       ============================================================ -->

  <defs>
    <linearGradient id="ringGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00549F"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <radialGradient id="centerGradV" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F4F7"/>
    </radialGradient>
  </defs>

  <g transform="translate(300,260)">
    <circle cx="0" cy="0" r="220" fill="url(#ringGradV)"/>
    <circle cx="0" cy="0" r="170" fill="url(#centerGradV)"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#003366" stroke-width="1"/>
    <circle cx="0" cy="0" r="172" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>

    <!-- Пульсирующие кольца (v.2.1 — плавная, цикл 4s, сдвиг 0.8s) -->
    <g fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="17" stroke="#003366" stroke-width="2" opacity="0">
        <animate attributeName="r" from="17" to="130" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="2" to="0.4" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="17" stroke="#00549F" stroke-width="1.8" opacity="0">
        <animate attributeName="r" from="17" to="130" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.8" to="0.4" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="17" stroke="#00549F" stroke-width="1.6" opacity="0">
        <animate attributeName="r" from="17" to="130" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.6" to="0.3" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="17" stroke="#4A6378" stroke-width="1.3" opacity="0">
        <animate attributeName="r" from="17" to="130" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.3" to="0.3" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="17" stroke="#4A6378" stroke-width="1.1" opacity="0">
        <animate attributeName="r" from="17" to="130" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.1" to="0.2" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>

      <!-- Статичные опорные кольца -->
      <circle cx="0" cy="0" r="33" stroke="#00549F" stroke-width="1" opacity="0.25"/>
      <circle cx="0" cy="0" r="51" stroke="#00549F" stroke-width="0.8" opacity="0.18"/>
      <circle cx="0" cy="0" r="70" stroke="#00549F" stroke-width="0.7" opacity="0.13"/>
      <circle cx="0" cy="0" r="90" stroke="#00549F" stroke-width="0.6" opacity="0.08"/>
    </g>

    <!-- Эпицентр — мягкая пульсация -->
    <circle cx="0" cy="0" r="5" fill="#C8102E">
      <animate attributeName="r" values="5;6;5" dur="2.5s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF"/>

    <circle cx="0" cy="0" r="218" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="223" fill="none" stroke="#003366" stroke-width="0.6"/>
  </g>

  <!-- Текстовый блок -->
  <text x="300" y="600" text-anchor="middle"
        font-family="'PT Sans Narrow','Helvetica Neue',Arial,sans-serif"
        font-size="56" font-weight="700" letter-spacing="6"
        fill="#00549F">SEISMO.RU</text>

  <text x="300" y="650" text-anchor="middle"
        font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="700" letter-spacing="4"
        fill="#003366">СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ</text>

  <text x="300" y="680" text-anchor="middle"
        font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="18" font-weight="400" letter-spacing="3"
        fill="#4A6378">информационная система</text>

  <line x1="220" y1="700" x2="380" y2="700" stroke="#00549F" stroke-width="1.5"/>

  <text x="300" y="730" text-anchor="middle"
        font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" letter-spacing="3"
        fill="#00549F">СРОСС® · СИСТЕМА · 2009—2026</text>

  <text x="300" y="760" text-anchor="middle"
        font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="400" letter-spacing="2"
        fill="#4A6378">SEISMIC SAFETY OF RUSSIA · INFORMATION SYSTEM</text>
</svg>
