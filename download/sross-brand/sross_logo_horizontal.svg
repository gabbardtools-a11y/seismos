<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" width="1400" height="400">
  <!-- ============================================================
       ГОРИЗОНТАЛЬНЫЙ ЛОГОТИП СРОСС® (v.2.0)
       Эмблема (слева, без волн, с пульсирующими кольцами)
       + текстовый блок (справа)
       ============================================================ -->

  <defs>
    <linearGradient id="ringGradH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00549F"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <radialGradient id="centerGradH" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F4F7"/>
    </radialGradient>
  </defs>

  <!-- ====== ЛЕВАЯ ЧАСТЬ: Эмблема ====== -->
  <g transform="translate(200,200)">
    <circle cx="0" cy="0" r="180" fill="url(#ringGradH)"/>
    <circle cx="0" cy="0" r="138" fill="url(#centerGradH)"/>
    <circle cx="0" cy="0" r="138" fill="none" stroke="#003366" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FFFFFF" stroke-width="0.7" opacity="0.6"/>

    <!-- Пульсирующие кольца (v.2.1 — плавная, цикл 4s, сдвиг 0.8s) -->
    <g fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="14" stroke="#003366" stroke-width="1.8" opacity="0">
        <animate attributeName="r" from="14" to="100" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.8" to="0.4" dur="4s" repeatCount="indefinite" begin="0s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="14" stroke="#00549F" stroke-width="1.5" opacity="0">
        <animate attributeName="r" from="14" to="100" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.5" to="0.3" dur="4s" repeatCount="indefinite" begin="0.8s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="14" stroke="#00549F" stroke-width="1.3" opacity="0">
        <animate attributeName="r" from="14" to="100" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.3" to="0.3" dur="4s" repeatCount="indefinite" begin="1.6s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="14" stroke="#4A6378" stroke-width="1.1" opacity="0">
        <animate attributeName="r" from="14" to="100" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="1.1" to="0.2" dur="4s" repeatCount="indefinite" begin="2.4s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>
      <circle cx="0" cy="0" r="14" stroke="#4A6378" stroke-width="0.9" opacity="0">
        <animate attributeName="r" from="14" to="100" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
        <animate attributeName="stroke-width" from="0.9" to="0.2" dur="4s" repeatCount="indefinite" begin="3.2s"
                 calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      </circle>

      <!-- Статичные опорные кольца (видны на печати/PNG) -->
      <circle cx="0" cy="0" r="27" stroke="#00549F" stroke-width="0.8" opacity="0.25"/>
      <circle cx="0" cy="0" r="42" stroke="#00549F" stroke-width="0.7" opacity="0.18"/>
      <circle cx="0" cy="0" r="58" stroke="#00549F" stroke-width="0.6" opacity="0.13"/>
      <circle cx="0" cy="0" r="74" stroke="#00549F" stroke-width="0.5" opacity="0.08"/>
    </g>

    <!-- Эпицентр — мягкая пульсация -->
    <circle cx="0" cy="0" r="4" fill="#C8102E">
      <animate attributeName="r" values="4;4.8;4" dur="2.5s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>

    <circle cx="0" cy="0" r="178" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.4"/>
    <circle cx="0" cy="0" r="183" fill="none" stroke="#003366" stroke-width="0.5"/>
  </g>

  <!-- ====== ПРАВАЯ ЧАСТЬ: Текстовый блок ====== -->
  <g transform="translate(420,0)">
    <line x1="0" y1="80" x2="0" y2="320" stroke="#00549F" stroke-width="2" opacity="0.45"/>
    <line x1="3" y1="80" x2="3" y2="320" stroke="#00549F" stroke-width="0.5" opacity="0.25"/>

    <g transform="translate(40,0)">
      <text x="0" y="155"
            font-family="'PT Sans Narrow','Helvetica Neue',Arial,sans-serif"
            font-size="72" font-weight="700" letter-spacing="3"
            fill="#00549F">SEISMO.RU</text>

      <text x="0" y="215"
            font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
            font-size="38" font-weight="700" letter-spacing="5"
            fill="#003366">СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ</text>

      <text x="0" y="252"
            font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
            font-size="22" font-weight="400" letter-spacing="3"
            fill="#4A6378">информационная система</text>

      <line x1="0" y1="275" x2="120" y2="275" stroke="#00549F" stroke-width="2"/>
      <text x="0" y="305"
            font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
            font-size="16" font-weight="600" letter-spacing="2.5"
            fill="#00549F">СРОСС® · СИСТЕМА · 2009—2026</text>

      <text x="0" y="335"
            font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
            font-size="14" font-weight="400" letter-spacing="2"
            fill="#4A6378">SEISMIC SAFETY OF RUSSIA · INFORMATION SYSTEM</text>
    </g>
  </g>
</svg>
