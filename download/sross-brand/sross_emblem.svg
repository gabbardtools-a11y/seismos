<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- ============================================================
       ЭМБЛЕМА СРОСС®  —  Круглый медальон (v.2.0)
       Без волн. Только концентрические кольца вокруг эпицентра.
       Кольца пульсируют: расширяются от центра и затухают —
       как распространение сейсмической волны.
       Стиль: строгий, официально-научный.
       ============================================================ -->

  <defs>
    <!-- Цветовая палитра (UN-aligned, строгая) -->
    <!-- UN Blue   #00549F  основной -->
    <!-- Deep Navy #003366  акцентный -->
    <!-- Steel     #4A6378  вспомогательный -->
    <!-- Alert     #C8102E  эпицентр -->

    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#00549F"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>

    <radialGradient id="centerGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F4F7"/>
    </radialGradient>

    <!-- Тонкая дуга для текста (верхняя, надпись "СРОСС") -->
    <path id="topArc"
          d="M 130,300 A 170,170 0 0 1 470,300"
          fill="none"/>
    <!-- Тонкая дуга для текста (нижняя, надпись "СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ") -->
    <path id="bottomArc"
          d="M 140,335 A 160,160 0 0 0 460,335"
          fill="none"/>
  </defs>

  <!-- 1. Внешний синий круг (медальон) -->
  <circle cx="300" cy="300" r="290" fill="url(#ringGrad)"/>

  <!-- 2. Внутреннее поле (рабочая зона) -->
  <circle cx="300" cy="300" r="220" fill="url(#centerGrad)"/>

  <!-- 3. Тонкая разделительная обводка -->
  <circle cx="300" cy="300" r="220" fill="none" stroke="#003366" stroke-width="1.2"/>
  <circle cx="300" cy="300" r="225" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- ============================================================
       4. ПУЛЬСИРУЮЩИЕ КОНЦЕНТРИЧЕСКИЕ КОЛЬЦА (v.2.1 — плавная)
       Концепция: от эпицентра в центре расходятся «сейсмические
       волны» — кольца, которые расширяются и затухают.
       Анимация: 5 колец, цикл 4 сек, сдвиг 0.8 сек.
       Плавный fade-in (0 → 0.85 за первые 15%) и fade-out.
       Кривая: spline с natural ease-out.
       ============================================================ -->
  <g fill="none" stroke-linecap="round">

    <!-- Кольцо 1 (ближайшее к центру, самое тёмное) -->
    <circle cx="300" cy="300" r="22" stroke="#003366" stroke-width="2.5" opacity="0">
      <animate attributeName="r" from="22" to="160" dur="4s" repeatCount="indefinite" begin="0s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
      <animate attributeName="stroke-width" from="2.5" to="0.5" dur="4s" repeatCount="indefinite" begin="0s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
    </circle>

    <!-- Кольцо 2 -->
    <circle cx="300" cy="300" r="22" stroke="#00549F" stroke-width="2" opacity="0">
      <animate attributeName="r" from="22" to="160" dur="4s" repeatCount="indefinite" begin="0.8s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="0.8s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
      <animate attributeName="stroke-width" from="2" to="0.4" dur="4s" repeatCount="indefinite" begin="0.8s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
    </circle>

    <!-- Кольцо 3 -->
    <circle cx="300" cy="300" r="22" stroke="#00549F" stroke-width="1.8" opacity="0">
      <animate attributeName="r" from="22" to="160" dur="4s" repeatCount="indefinite" begin="1.6s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="1.6s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
      <animate attributeName="stroke-width" from="1.8" to="0.4" dur="4s" repeatCount="indefinite" begin="1.6s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
    </circle>

    <!-- Кольцо 4 -->
    <circle cx="300" cy="300" r="22" stroke="#4A6378" stroke-width="1.5" opacity="0">
      <animate attributeName="r" from="22" to="160" dur="4s" repeatCount="indefinite" begin="2.4s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="2.4s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
      <animate attributeName="stroke-width" from="1.5" to="0.3" dur="4s" repeatCount="indefinite" begin="2.4s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
    </circle>

    <!-- Кольцо 5 -->
    <circle cx="300" cy="300" r="22" stroke="#4A6378" stroke-width="1.2" opacity="0">
      <animate attributeName="r" from="22" to="160" dur="4s" repeatCount="indefinite" begin="3.2s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4s" repeatCount="indefinite" begin="3.2s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94" keyTimes="0;0.15;1"/>
      <animate attributeName="stroke-width" from="1.2" to="0.2" dur="4s" repeatCount="indefinite" begin="3.2s"
               calcMode="spline" keySplines="0.25 0.46 0.45 0.94" keyTimes="0;1"/>
    </circle>

    <!-- Статичные тонкие опорные кольца (для визуальной структуры,
         когда анимация не воспроизводится — на печати/в PNG) -->
    <circle cx="300" cy="300" r="42"  stroke="#00549F" stroke-width="1" opacity="0.25"/>
    <circle cx="300" cy="300" r="64"  stroke="#00549F" stroke-width="0.8" opacity="0.18"/>
    <circle cx="300" cy="300" r="88"  stroke="#00549F" stroke-width="0.7" opacity="0.13"/>
    <circle cx="300" cy="300" r="114" stroke="#00549F" stroke-width="0.6" opacity="0.08"/>
  </g>

  <!-- 5. Эпицентр — красная точка с мягкой пульсацией -->
  <circle cx="300" cy="300" r="6" fill="#C8102E">
    <animate attributeName="r" values="6;7.2;6" dur="2.5s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
  </circle>
  <circle cx="300" cy="300" r="3" fill="#FFFFFF"/>

  <!-- ============================================================
       6. ТЕКСТ ПО ОКРУЖНОСТИ
       Верхняя дуга: СРОСС®
       Нижняя дуга: СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ
       ============================================================ -->
  <text font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" letter-spacing="6"
        fill="#FFFFFF" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">СРОСС®</textPath>
  </text>

  <text font-family="'PT Sans','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="600" letter-spacing="3"
        fill="#FFFFFF" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">СЕЙСМОБЕЗОПАСНОСТЬ РОССИИ</textPath>
  </text>

  <!-- 7. Декоративные точки-разделители (4 шт. по сторонам света) -->
  <g fill="#FFFFFF">
    <circle cx="300" cy="80"  r="3.5"/>
    <circle cx="300" cy="520" r="3.5"/>
    <circle cx="80"  cy="300" r="3.5"/>
    <circle cx="520" cy="300" r="3.5"/>
  </g>

  <!-- 8. Тонкая внешняя кайма -->
  <circle cx="300" cy="300" r="288" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="300" r="293" fill="none" stroke="#003366" stroke-width="0.8"/>

</svg>
